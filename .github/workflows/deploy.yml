# 自動部署至 GitHub Pages
#
# 觸發時機：push 到 main 分支，或手動於 Actions 頁面執行。
# 流程：安裝依賴 → vite build → 上傳 dist → 部署至 Pages。
#
# 前置設定（只需一次）：
#   GitHub repo → Settings → Pages → Build and deployment → Source 選 "GitHub Actions"。
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# 授予 workflow 部署 Pages 所需權限
permissions:
  contents: read
  pages: write
  id-token: write

# 同一時間只允許一個部署，避免併發衝突；但不中斷進行中的部署
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
