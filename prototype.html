<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>風場大戰 · 互動 Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Cormorant+Garamond:wght@400;500;600;700&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<style>
  html, body, #root { margin: 0; padding: 0; width: 100%; height: 100%; }
  body { background: #d8ecf4; font-family: 'Manrope', system-ui, sans-serif; overflow: hidden; }
  * { box-sizing: border-box; }
  button { font-family: inherit; }
  /* Hide scrollbars on all panels */
  *::-webkit-scrollbar { width: 6px; height: 6px; }
  *::-webkit-scrollbar-track { background: transparent; }
  *::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>

<!-- React -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Tweaks panel -->
<script type="text/babel" src="tweaks-panel.jsx"></script>

<!-- Shared -->
<script type="text/babel" src="shared/icons.jsx"></script>
<script src="shared/cards-data.js"></script>

<!-- Proto modules -->
<script src="proto/themes.js"></script>
<script type="text/babel" src="proto/stage.jsx"></script>
<script type="text/babel" src="proto/state.jsx"></script>
<script type="text/babel" src="proto/effects.jsx"></script>
<script type="text/babel" src="proto/themed-card.jsx"></script>
<script type="text/babel" src="proto/themed-turbine.jsx"></script>
<script type="text/babel" src="proto/battle-chrome.jsx"></script>
<script type="text/babel" src="proto/battle-center.jsx"></script>
<script type="text/babel" src="proto/battle.jsx"></script>
<script type="text/babel" src="proto/screens.jsx"></script>
<script type="text/babel" src="proto/app.jsx"></script>
</body>
</html>
